# ----------------------------------------------------------------------
# basic behaviour modification
# ----------------------------------------------------------------------
set -g mouse on               # allow mouse usage
set -g base-index 1           # base index 1 for windows
set -g pane-base-index 1      # base index 1 for panes
set -g renumber-windows on    # allow window renumbering after detach

# replace C-b with C-a as prefix
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# color support
set -g default-terminal 'tmux-256color'
set -as terminal-features ",xterm-256color:RGB"
set -ag terminal-overrides ',xterm-256color*:RGB'

# image.nvim settings
set -gq allow-passthrough on 
set -g visual-activity off
set-option -g focus-events on

# ----------------------------------------------------------------------
# tpm plugin list (before any plugins can be used)
# ----------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'                  # plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'        # sensible defaults
set -g @plugin 'christoomey/vim-tmux-navigator'    # vim<->tmux navigation
set -g @plugin 'tmux-plugins/tmux-yank'            # yank integration
set -g @plugin 'catppuccin/tmux#v2.1.3'            # catppuccin theme
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'erikw/tmux-dark-notify'            # dark‑notify helper
set -g @plugin 'tmux-plugins/tmux-battery'         # battery for status
set -g @plugin 'tmux-plugins/tmux-cpu'             # CPU for status
set -g @plugin 'oluevaera/tmux-conda-inherit'      # auto conda activate for new panes/windows

# ----------------------------------------------------------------------
# catppuccin theme configuration (before invocation in status styling)
# ----------------------------------------------------------------------

# catppuccin_reset is used to reset the state of catppuccin vars for the tmux status bar
# since this config switches theme based on system light/dark mode, we use reset
set -g @catppuccin_reset 'true'
run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'

# catppuccin options must be set again and catppuccin must be run
# according to the docs for catppuccin_reset: 
# https://github.com/catppuccin/tmux/blob/main/docs/tutorials/03-resetting-theme.md#changing-the-flavor-of-the-theme-by-resetting
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_status 'no'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_current_color '#{E:@thm_surface_2}'
set -g @catppuccin_date_time_text '%d-%m-%y %H:%M'
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'
run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'

# ----------------------------------------------------------------------
# status line configuration (after catppuccin is loaded)
# ----------------------------------------------------------------------
set -g allow-rename off
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-right-length 100
set -g status-left-length 100

set -g status-left  '#[fg=green]#{E:@catppuccin_status_session} '
set -gF status-right "#{E:@catppuccin_status_pomodoro_plus}"
set -ag status-right '#{E:@catppuccin_status_application}'

# modules covered by simple-bar
# set -agF status-right '#{E:@catppuccin_status_cpu}'
# set -agF status-right '#{E:@catppuccin_status_battery}'
# set -ag  status-right '#{E:@catppuccin_status_date_time}'

# install pomodoro plugin
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# tmux-conda-inherit
# Add -e "TMUX_PARENT_PANE_ID=#{pane_id}" to your window split/new keybinds
bind '%' run 'tmux split-window -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}" -h'
bind '"' run 'tmux split-window -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}" -v'
bind c run 'tmux new-window -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}"'

# ----------------------------------------------------------------------
# provide dark‑notify with light and dark themes
# ----------------------------------------------------------------------

# catppuccin flavors
# catppuccin latte for light & mocha for dark
# set -g @dark-notify-theme-path-light "$HOME/.config/tmux/catppuccin-helpers/latte.conf"
# set -g @dark-notify-theme-path-dark  "$HOME/.config/tmux/catppuccin-helpers/mocha.conf"

# cyberdream flavors
# cyberdream light for light & cyberdream for dark
set -g @dark-notify-theme-path-light '~/.config/tmux/catppuccin-helpers/cyberdream-light.conf'
set -g @dark-notify-theme-path-dark  '~/.config/tmux/catppuccin-helpers/cyberdream.conf'

# ----------------------------------------------------------------------
# vim‑style pane navigation & copy mode
# ----------------------------------------------------------------------
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# split shortcuts (vim‑style)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config shortcut
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"


# ----------------------------------------------------------------------
# tpm & dark-notify initialisation
# ----------------------------------------------------------------------
run -b '~/.tmux/plugins/tpm/tpm'

# load dark‑notify file if it already exists (after a reload)
if-shell "[ -e $HOME/.local/state/tmux/tmux-dark-notify-theme.conf ]" \
    "source-file $HOME/.local/state/tmux/tmux-dark-notify-theme.conf"
